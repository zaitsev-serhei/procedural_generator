server:
  port: 8080

spring:
  application:
    name: procedural-map-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/procedural_generations
    username: db_admin
    password: admin123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

logging:
  level:
    org.hibernate.SQL: debug
    com.proceduralmap: debug

app:
  api:
    base-url: /api